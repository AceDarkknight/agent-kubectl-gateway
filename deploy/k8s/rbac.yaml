# ServiceAccount for agent-kubectl-gateway
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-kubectl-gateway
  labels:
    app: agent-kubectl-gateway
---
# ClusterRole: grant read-only + limited write access to cluster resources (no delete)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-kubectl-gateway
  labels:
    app: agent-kubectl-gateway
rules:
  # All resources (including CRDs): read-only
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]

  # Core resources: limited write (no delete)
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - configmaps
      - secrets
      - serviceaccounts
    verbs: ["create", "update", "patch"]

  # Apps resources: limited write (no delete)
  - apiGroups: ["apps"]
    resources:
      - deployments
      - deployments/scale
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["create", "update", "patch"]

  # Batch resources: limited write (no delete)
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["create", "update", "patch"]
---
# ClusterRoleBinding: bind the ClusterRole to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-kubectl-gateway
  labels:
    app: agent-kubectl-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-kubectl-gateway
subjects:
  - kind: ServiceAccount
    name: agent-kubectl-gateway
    namespace: default
